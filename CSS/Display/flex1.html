<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #products{
           background-color: #00ffff;
           display: flex;
           justify-content: center;
           gap: 50px;
           align-items: center;
           height: 600px;

        }

        .box{

            border: 1px solid white;
            width: 100px;
            height: 100px;
            border-radius: 12px;
            text-align: center;
            background-color: brown;
        }

    </style>
</head>
<body>
    <!-- Dislay Flex : It is use for 1 Dimnsional Layout. It can be used to align items in a row or column. 
    It is a powerful layout system that can be used to create complex layouts with ease. -->

  <div id="products">

    <div class="box">Cake</div>
    <div class="box">Cookie</div>
    <div class="box">Water</div>

  </div>

</body>
</html>
