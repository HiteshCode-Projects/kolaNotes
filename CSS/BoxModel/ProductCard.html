<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .Product{
           border: 1px solid brown;
           width: 250px;
           padding: 30px;
           text-align: center;
           margin: 25px;
           border-radius: 12px;
           background-color: whitesmoke;
        }

        .Product img{
            object-fit: cover;
            width: 100%;
            height: 300px;
            border-radius: 12px;
            border: 2px solid brown;
        }

        .Product button{
            background-color: orange;
            border: none;
            padding: 15px;
            border-radius: 15px;
            color: white;
        }

        .Product h2{
            border-bottom: 2px solid orange;
        }
    </style>
</head>
<body>

    <div class="Product">
        <img src="https://images.pexels.com/photos/14017572/pexels-photo-14017572.jpeg" >
        <h2>Speaker</h2>
        <p>$50</p>
        <button>Buy Now</button>
    </div>

    <div class="Product">
        <img src="https://images.pexels.com/photos/50614/pexels-photo-50614.jpeg" >
        <h2>Phone</h2>
        <p>$80</p>
        <button>Buy Now</button>
    </div>

    <div class="Product">
        <img src="https://images.pexels.com/photos/34151788/pexels-photo-34151788.jpeg" >
        <h2>Shoes</h2>
        <p>$20</p>
        <button>Buy Now</button>
    </div>

</body>
</html>
